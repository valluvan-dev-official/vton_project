version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - ../storage:/app/storage
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: ../.env
    volumes:
      - ../storage:/app/storage
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=2

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vton
      POSTGRES_PASSWORD: vton
      POSTGRES_DB: vton
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
